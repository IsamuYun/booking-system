<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:30px;}
  .cap{margin:0 0 20px;font-size:12px;color:var(--color-fg4);font-weight:500;letter-spacing:.04em;font-family:var(--font-num);}
  .lockup{display:flex;align-items:center;gap:16px;}
  .mark{width:60px;height:60px;border-radius:16px;background:linear-gradient(150deg,var(--green-500),var(--green-700));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-card);}
  .wm .zh{font-family:var(--font-serif);font-weight:600;font-size:32px;color:var(--color-fg1);letter-spacing:.04em;line-height:1;}
  .wm .en{font-size:13px;color:var(--color-fg3);letter-spacing:.22em;text-transform:uppercase;margin-top:6px;}
  .note{margin-top:22px;font-size:11px;color:var(--color-fg4);}
</style></head><body>
<p class="cap">LOGO / 字标 (wordmark + “倾听 = listen” ear motif)</p>
<div class="lockup">
  <div class="mark">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 1 0 4"/></svg>
  </div>
  <div class="wm">
    <div class="zh">倾听心理</div>
    <div class="en">Lisening</div>
  </div>
</div>
<p class="note">占位字标 — 请提供正式 logo 文件替换。Placeholder wordmark; supply the real logo.</p>
</body></html>
