<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px;}
  .row{display:flex;gap:0;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-card);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw .n{font-size:11px;font-weight:600;}
  .sw .h{font-size:10px;opacity:0.78;font-family:var(--font-num);}
  .cap{margin:0 0 14px;font-size:13px;color:var(--color-fg3);font-weight:500;letter-spacing:.02em;}
</style></head><body>
<p class="cap">主色 · 青绿 (Primary — teal green, #148F77)</p>
<div class="row">
  <div class="sw" style="background:var(--green-50)"><span class="n" style="color:var(--green-700)">50</span><span class="h" style="color:var(--green-700)">#EEF8F4</span></div>
  <div class="sw" style="background:var(--green-100)"><span class="n" style="color:var(--green-700)">100</span><span class="h" style="color:var(--green-700)">#D8F0E9</span></div>
  <div class="sw" style="background:var(--green-200)"><span class="n" style="color:var(--green-700)">200</span><span class="h" style="color:var(--green-700)">#AEE1D4</span></div>
  <div class="sw" style="background:var(--green-300)"><span class="n" style="color:var(--green-900)">300</span><span class="h" style="color:var(--green-900)">#79CBB9</span></div>
  <div class="sw" style="background:var(--green-400)"><span class="n" style="color:#fff">400</span><span class="h" style="color:#fff">#40AD96</span></div>
  <div class="sw" style="background:var(--green-500)"><span class="n" style="color:#fff">500 ★</span><span class="h" style="color:#fff">#148F77</span></div>
  <div class="sw" style="background:var(--green-600)"><span class="n" style="color:#fff">600</span><span class="h" style="color:#fff">#0F7763</span></div>
  <div class="sw" style="background:var(--green-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:#fff">#0C5F4F</span></div>
  <div class="sw" style="background:var(--green-900)"><span class="n" style="color:#fff">900</span><span class="h" style="color:#fff">#073A30</span></div>
</div>
</body></html>
