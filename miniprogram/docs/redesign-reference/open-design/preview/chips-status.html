<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../ui_kits/miniprogram/kit.css">
<style>
  body{background:var(--color-surface);padding:26px;}
  .cap{margin:0 0 14px;font-size:13px;color:var(--color-fg3);font-weight:500;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
</style></head><body>
<p class="cap">标签 (Chips / tags)</p>
<div class="row">
  <span class="chip">个体咨询</span>
  <span class="chip">注册系统</span>
  <span class="chip chip-neutral">1–2 人</span>
  <span class="chip chip-neutral">18㎡</span>
  <span class="chip chip-line">自然采光</span>
</div>
<p class="cap">使用状态徽标 (Status badges)</p>
<div class="row" style="margin-bottom:0;">
  <span class="status status-free"><span class="dot"></span>空闲</span>
  <span class="status status-busy"><span class="dot"></span>已预约</span>
  <span class="status status-rest"><span class="dot"></span>休息</span>
</div>
</body></html>
