<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px;}
  .cap{margin:0 0 16px;font-size:13px;color:var(--color-fg3);font-weight:500;}
  .bar{display:flex;align-items:center;gap:14px;margin-bottom:9px;}
  .bar .fill{height:18px;background:var(--green-400);border-radius:4px;}
  .bar .n{font-size:11px;color:var(--color-fg2);width:64px;font-weight:600;}
  .bar .v{font-size:10px;color:var(--color-fg4);font-family:var(--font-num);}
</style></head><body>
<p class="cap">间距 (Spacing scale — 4px base)</p>
<div class="bar"><span class="n">sp-1</span><div class="fill" style="width:4px"></div><span class="v">4px</span></div>
<div class="bar"><span class="n">sp-2</span><div class="fill" style="width:8px"></div><span class="v">8px</span></div>
<div class="bar"><span class="n">sp-3</span><div class="fill" style="width:12px"></div><span class="v">12px</span></div>
<div class="bar"><span class="n">sp-4 ★</span><div class="fill" style="width:16px"></div><span class="v">16px · 页面边距</span></div>
<div class="bar"><span class="n">sp-5</span><div class="fill" style="width:20px"></div><span class="v">20px</span></div>
<div class="bar"><span class="n">sp-6</span><div class="fill" style="width:24px"></div><span class="v">24px</span></div>
<div class="bar"><span class="n">sp-8</span><div class="fill" style="width:32px"></div><span class="v">32px</span></div>
<div class="bar"><span class="n">sp-10</span><div class="fill" style="width:40px"></div><span class="v">40px</span></div>
</body></html>
