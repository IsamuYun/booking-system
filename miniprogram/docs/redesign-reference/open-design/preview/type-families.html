<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px 28px;}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  .col .h{font-size:11px;color:var(--color-fg4);font-family:var(--font-num);margin-bottom:8px;letter-spacing:.04em;}
  .col .big{font-size:34px;line-height:1.1;color:var(--color-fg1);}
  .col .sub{font-size:12px;color:var(--color-fg3);margin-top:8px;}
</style></head><body>
<div class="grid">
  <div class="col">
    <div class="h">SERIF — 标题/品牌</div>
    <div class="big" style="font-family:var(--font-serif);font-weight:600;">倾听 Aa</div>
    <div class="sub">Noto Serif SC · 400 / 500 / 600 / 700</div>
  </div>
  <div class="col">
    <div class="h">SANS — 正文/界面</div>
    <div class="big" style="font-family:var(--font-sans);font-weight:500;">咨询 Aa</div>
    <div class="sub">Noto Sans SC · 400 / 500 / 700</div>
  </div>
  <div class="col">
    <div class="h">TABULAR — 数字/时间</div>
    <div class="big t-num" style="font-weight:600;color:var(--color-primary-deep);">09:00<br>21:00</div>
    <div class="sub">tnum 等宽数字 · 日历/时段</div>
  </div>
</div>
</body></html>
