<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px;}
  .cap{margin:0 0 16px;font-size:13px;color:var(--color-fg3);font-weight:500;}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{text-align:center;}
  .box{background:var(--green-100);border:1.5px solid var(--green-300);width:70px;height:70px;}
  .item .n{font-size:11px;color:var(--color-fg2);margin-top:8px;font-weight:600;}
  .item .v{font-size:10px;color:var(--color-fg4);font-family:var(--font-num);}
</style></head><body>
<p class="cap">圆角 (Corner radii)</p>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><div class="n">xs</div><div class="v">6px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><div class="n">sm</div><div class="v">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="n">md ★</div><div class="v">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="n">lg</div><div class="v">16px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><div class="n">xl</div><div class="v">20px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-pill)"></div><div class="n">pill</div><div class="v">999px</div></div>
</div>
</body></html>
