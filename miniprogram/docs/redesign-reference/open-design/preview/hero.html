<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px;}
  .cap{margin:0 0 14px;font-size:13px;color:var(--color-fg3);font-weight:500;}
  .hero{position:relative;overflow:hidden;border-radius:var(--r-lg);padding:30px 26px;background:linear-gradient(160deg,var(--green-600) 0%,var(--green-700) 55%,var(--green-900) 100%);}
  .g1{position:absolute;top:-50px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(120,210,185,.45),transparent 70%);}
  .g2{position:absolute;bottom:-40px;left:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 70%);}
  .badge{position:relative;display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,.14);border:.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.92);font-size:12px;letter-spacing:.04em;margin-bottom:14px;}
  .name{position:relative;font-family:var(--font-serif);font-weight:600;font-size:34px;color:#fff;letter-spacing:.02em;margin:0;}
  .tag{position:relative;font-family:var(--font-serif);font-size:16px;color:rgba(255,255,255,.85);margin:10px 0 0;}
</style></head><body>
<p class="cap">主视觉渐变 (Hero gradient — warm-glow over deep sage)</p>
<div class="hero">
  <div class="g1"></div><div class="g2"></div>
  <span class="badge">Lisening · 心理咨询</span>
  <h1 class="name">倾听心理</h1>
  <p class="tag">被听见，是改变的开始</p>
</div>
</body></html>
