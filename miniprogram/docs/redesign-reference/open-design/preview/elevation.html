<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);padding:30px 24px;}
  .cap{margin:0 0 20px;font-size:13px;color:var(--color-fg3);font-weight:500;}
  .row{display:flex;gap:24px;}
  .item{flex:1;text-align:center;}
  .box{background:var(--paper);height:80px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--color-fg2);font-weight:600;}
  .item .v{font-size:10px;color:var(--color-fg4);margin-top:10px;font-family:var(--font-num);}
</style></head><body>
<p class="cap">阴影 / 高度 (Elevation — soft & low, on warm cream)</p>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-card)">card</div><div class="v">卡片 · 列表项</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-raise)">raise</div><div class="v">浮起 · 选中</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-float)">float</div><div class="v">悬浮 · 弹层</div></div>
</div>
</body></html>
