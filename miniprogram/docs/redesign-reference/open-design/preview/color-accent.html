<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px;}
  .row{display:flex;gap:0;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-card);}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw .n{font-size:11px;font-weight:600;}
  .sw .h{font-size:10px;opacity:0.8;font-family:var(--font-num);}
  .cap{margin:0 0 14px;font-size:13px;color:var(--color-fg3);font-weight:500;letter-spacing:.02em;}
</style></head><body>
<p class="cap">点缀色 · 暖陶土 (Accent — warm clay, used sparingly)</p>
<div class="row">
  <div class="sw" style="background:var(--clay-100)"><span class="n" style="color:var(--clay-600)">100</span><span class="h" style="color:var(--clay-600)">#F5E6DE</span></div>
  <div class="sw" style="background:var(--clay-300)"><span class="n" style="color:var(--clay-600)">300</span><span class="h" style="color:var(--clay-600)">#E2B4A1</span></div>
  <div class="sw" style="background:var(--clay-400)"><span class="n" style="color:#fff">400</span><span class="h" style="color:#fff">#D08A6E</span></div>
  <div class="sw" style="background:var(--clay-500)"><span class="n" style="color:#fff">500 ★</span><span class="h" style="color:#fff">#C26B4C</span></div>
  <div class="sw" style="background:var(--clay-600)"><span class="n" style="color:#fff">600</span><span class="h" style="color:#fff">#A9573B</span></div>
</div>
</body></html>
