<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#EEF1F0;padding:24px;}
  .row{display:flex;gap:0;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-card);}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw .n{font-size:11px;font-weight:600;}
  .sw .h{font-size:10px;opacity:0.8;font-family:var(--font-num);}
  .cap{margin:0 0 14px;font-size:13px;color:var(--color-fg3);font-weight:500;letter-spacing:.02em;}
</style></head><body>
<p class="cap">中性色 · 白底 (Neutrals — UI sits on white)</p>
<div class="row">
  <div class="sw" style="background:var(--paper)"><span class="n" style="color:var(--ink)">white</span><span class="h" style="color:var(--ink-2)">#FFFFFF</span></div>
  <div class="sw" style="background:var(--line)"><span class="n" style="color:var(--ink)">line</span><span class="h" style="color:var(--ink-2)">#E7EDEB</span></div>
  <div class="sw" style="background:var(--line-strong)"><span class="n" style="color:var(--ink)">line-2</span><span class="h" style="color:var(--ink-2)">#D5DEDB</span></div>
  <div class="sw" style="background:var(--ink-4)"><span class="n" style="color:#fff">fg4</span><span class="h" style="color:#fff">#AEB6B2</span></div>
  <div class="sw" style="background:var(--ink-3)"><span class="n" style="color:#fff">fg3</span><span class="h" style="color:#fff">#828D89</span></div>
  <div class="sw" style="background:var(--ink-2)"><span class="n" style="color:#fff">fg2</span><span class="h" style="color:#fff">#4E5A56</span></div>
  <div class="sw" style="background:var(--ink)"><span class="n" style="color:#fff">fg1 / ink</span><span class="h" style="color:#fff">#1A2421</span></div>
</div>
</body></html>
