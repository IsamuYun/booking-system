<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:24px 28px;}
  .line{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--line);}
  .meta{width:150px;flex-shrink:0;font-size:11px;color:var(--color-fg4);font-family:var(--font-num);}
  .meta b{color:var(--color-fg2);font-weight:600;font-family:var(--font-sans);}
</style></head><body>
<div class="line"><span class="meta"><b>Display</b> · serif 30/600</span><span class="t-display" style="font-size:26px;">倾听 · 静水室</span></div>
<div class="line"><span class="meta"><b>H1</b> · serif 22/600</span><span class="t-h1">咨询室使用状况</span></div>
<div class="line"><span class="meta"><b>H2</b> · sans 17/700</span><span class="t-h2">今日可用咨询室</span></div>
<div class="line"><span class="meta"><b>H3</b> · sans 15/500</span><span class="t-h3">暖阳室 Warm Sun</span></div>
<div class="line"><span class="meta"><b>Body</b> · sans 15/400</span><span class="t-body">临窗采光，配有单人躺椅与绿植。</span></div>
<div class="line"><span class="meta"><b>Secondary</b> · 13/400</span><span class="t-sec">共 5 间咨询室，点击查看详情</span></div>
<div class="line" style="border:none;"><span class="meta"><b>Caption</b> · 12/400</span><span class="t-caption">预约由前台人工确认</span></div>
</body></html>
